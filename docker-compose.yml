version: "3.9"

services:
  sentrymcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: sentrymcp
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=src
    volumes:
      # Mount source for live reload during development
      - ./src:/app/src:ro
      - ./backend:/app/backend:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Dev override: hot reload ─────────────────────────────────────────────
  sentrymcp-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: sentrymcp-dev
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=src
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
    command: >
      python -m uvicorn agentai.adapters.inbound.api.app:app
      --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev
    restart: unless-stopped
